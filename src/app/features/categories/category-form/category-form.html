<div class="category-form-container">
  <h3>{{ categoryToEdit ? 'Editar Categoria' : 'Nova Categoria' }}</h3>
  
  <form [formGroup]="categoryForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="name">Nome:</label>
      <input 
        id="name" 
        type="text" 
        formControlName="name" 
        placeholder="Ex: Supermercado"
      />
      <div *ngIf="categoryForm.get('name')?.invalid && categoryForm.get('name')?.touched" class="error">
        O nome é obrigatório e deve ter pelo menos 3 caracteres.
      </div>
    </div>

    <div class="form-group">
      <label for="type">Tipo:</label>
      <select id="type" formControlName="type">
        <option [value]="CategoryType.Income">Receita</option>
        <option [value]="CategoryType.Expense">Despesa</option>
      </select>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="categoryForm.invalid">
        {{ categoryToEdit ? 'Atualizar' : 'Salvar' }}
      </button>
      <button type="button" *ngIf="categoryToEdit" class="btn-cancel" (click)="onCancel()">
        Cancelar
      </button>
    </div>
  </form>
</div>
